on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: atlas-packager
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  atlas-packager:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: iffy/install-nim@v5.1.1
        with:
          version: stable
      - name: Clone Atlas experiment branch
        run: git clone --depth 1 --branch experiment/packager https://github.com/nim-lang/atlas.git atlas
      - name: Build Atlas
        working-directory: atlas
        run: nim buildRelease
      - name: Run atlas-packager on pkgs
        run: ./atlas/bin/atlas-packager --packages-file=./packages.json --packages=./pkgs --no-tarballs --ephemeral --update-repos
        env:
          GITHUB_API_KEY: ${{ secrets.GITHUB_TOKEN }}
      - name: List changed releases files
        run: |
          changed_files="$(git status --porcelain -- pkgs | sed 's/^...//')"
          releases_files="$(printf '%s\n' "$changed_files" | grep '/releases\.json$' || true)"
          if [ -z "$releases_files" ]; then
            echo "No changed releases.json files"
            exit 0
          fi
          printf '%s\n' "$releases_files"
      - name: Commit and push releases updates
        run: |
          changed_files="$(git status --porcelain -- pkgs | sed 's/^...//')"
          releases_files="$(printf '%s\n' "$changed_files" | grep '/releases\.json$' || true)"
          if [ -z "$releases_files" ]; then
            echo "No changed releases.json files to commit"
            exit 0
          fi
          printf '%s\n' "$releases_files" | while IFS= read -r path; do
            [ -n "$path" ] && git add -- "$path"
          done
          git stash push --keep-index --include-untracked -m atlas-packager-nonrelease || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Atlas releases [skip ci]"
          git fetch origin master
          git pull --rebase origin master
          git push
